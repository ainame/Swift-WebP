name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-26, ubuntu-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: vapor/swiftly-action@v0.2.0
        with:
          toolchain: "6.2"
      - run: swift test

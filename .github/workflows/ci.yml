name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-26, ubuntu-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Read Swift version
        id: swift-version
        run: echo "version=$(cat .swift-version)" >> "$GITHUB_OUTPUT"
      - uses: vapor/swiftly-action@v0.2.0
        with:
          toolchain: ${{ steps.swift-version.outputs.version }}
      - run: swift test

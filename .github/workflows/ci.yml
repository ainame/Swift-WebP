name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  macos-test:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_26.2.app/Contents/Developer
          xcodebuild -version
      - run: swift test

  linux-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Read Swift version
        id: swift-version
        run: echo "version=$(cat .swift-version)" >> "$GITHUB_OUTPUT"
      - uses: vapor/swiftly-action@v0.2.0
        with:
          toolchain: ${{ steps.swift-version.outputs.version }}
      - run: swift test
